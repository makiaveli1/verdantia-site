name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify README screenshots
        run: |
          node <<'NODE'
          const fs = require('fs');
          const readme = fs.readFileSync('README.md', 'utf8');
          const paths = [...readme.matchAll(/<img\s+[^>]*src="([^"]+)"/g)].map((match) => match[1]);
          const missing = paths.filter((path) => !fs.existsSync(path));
          if (missing.length) {
            console.error(`Missing README screenshot(s): ${missing.join(', ')}`);
            process.exit(1);
          }
          console.log(`README screenshots verified: ${paths.length}/${paths.length}`);
          NODE
