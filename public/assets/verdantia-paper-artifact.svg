  <g fill="#0e3d2f" font-family="Aptos, Segoe UI, sans-serif" font-size="17" font-weight="800" letter-spacing="2" opacity="0.78">
    <text x="148" y="936">DISCOVER</text>
    <text x="326" y="908">PRACTISE</text>
    <text x="514" y="936">CHECK</text>
    <text x="690" y="902">REPEAT</text>
