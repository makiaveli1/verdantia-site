<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1180" viewBox="0 0 900 1180" role="img" aria-labelledby="title desc">
  <title id="title">Verdantia paper adoption artifact</title>
  <desc id="desc">A tactile editorial worksheet showing route lines, cards, check marks, and workflow lanes for AI adoption.</desc>
  <defs>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="4" seed="27" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.52" stop-color="#f6f1e8"/>
      <stop offset="1" stop-color="#eadfce"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" x2="1">
      <stop offset="0" stop-color="#0e3d2f"/>
      <stop offset="1" stop-color="#6b8f7a"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0v44" fill="none" stroke="#0e3d2f" stroke-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="900" height="1180" rx="34" fill="url(#paper)" filter="url(#paperNoise)"/>
  <rect x="42" y="44" width="816" height="1092" rx="22" fill="url(#grid)" opacity="0.75"/>
  <path d="M118 244C228 118 376 105 504 210c126 104 212 54 294-74" fill="none" stroke="#c9a35a" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 18"/>
  <path d="M122 780c164-170 514-176 656-4" fill="none" stroke="#0e3d2f" stroke-opacity="0.42" stroke-width="5" stroke-linecap="round"/>
  <path d="M206 740c108-82 272-84 384-4" fill="none" stroke="#6b8f7a" stroke-width="4" stroke-linecap="round"/>
  <g fill="#0e3d2f" opacity="0.08">
    <circle cx="186" cy="196" r="82"/>
    <circle cx="726" cy="864" r="132"/>
  </g>
  <g transform="translate(92 102)">
    <text x="0" y="0" fill="#0e3d2f" font-family="Georgia, serif" font-size="66" font-weight="700" letter-spacing="-2">AI adoption canvas</text>
    <text x="0" y="48" fill="#66736b" font-family="Aptos, Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="4">FIELD GUIDE / WORKSHOP ARTIFACT</text>
  </g>
  <g transform="translate(92 338)">
    <rect width="318" height="164" rx="24" fill="#fffdf8" stroke="#0e3d2f" stroke-opacity="0.18"/>
    <text x="28" y="48" fill="#c9a35a" font-family="Aptos, Segoe UI, sans-serif" font-size="18" font-weight="800" letter-spacing="3">01 MAP</text>
    <text x="28" y="91" fill="#0e3d2f" font-family="Georgia, serif" font-size="38" font-weight="700">Current work</text>
    <path d="M30 124h244M30 144h196" stroke="#0e3d2f" stroke-opacity="0.18" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(488 340)">
    <rect width="318" height="164" rx="24" fill="#0e3d2f" opacity="0.94"/>
    <text x="28" y="48" fill="#c9a35a" font-family="Aptos, Segoe UI, sans-serif" font-size="18" font-weight="800" letter-spacing="3">02 TRAIN</text>
    <text x="28" y="91" fill="#fffdf8" font-family="Georgia, serif" font-size="38" font-weight="700">Safe practice</text>
    <path d="M30 124h244M30 144h196" stroke="#fffdf8" stroke-opacity="0.2" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(92 560)">
