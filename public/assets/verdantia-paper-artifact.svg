    <text x="30" y="48" fill="#0e3d2f" font-family="Georgia, serif" font-size="36" font-weight="700">Reusable materials</text>
    <g fill="none" stroke="#0e3d2f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.72">
      <path d="M36 82l16 16 34-38"/>
      <path d="M208 82l16 16 34-38"/>
      <path d="M388 82l16 16 34-38"/>
      <path d="M568 82l16 16 34-38"/>
    </g>
    <g fill="#0e3d2f" opacity="0.58" font-family="Aptos, Segoe UI, sans-serif" font-size="18" font-weight="700">
      <text x="100" y="102">prompts</text>
      <text x="272" y="102">review</text>
      <text x="452" y="102">workflow</text>
      <text x="632" y="102">rhythm</text>
    </g>
  </g>
  <g transform="translate(114 872)" fill="#fffdf8" stroke="#0e3d2f" stroke-opacity="0.16">
